name: OHLCV backfill diario

# Descarga el OHLCV ajustado para todos los símbolos activos de wall.
# Itera batches de 200 tickers porque cada función Vercel tiene cap de 300s.
# Throttle interno: 60 calls/min para no triggear 429 de Yahoo.

on:
  schedule:
    # 01:30 UTC lun-vie. Ventana off-peak Yahoo + separada del snapshot (21UTC)
    # para no concentrar el rate budget.
    - cron: '30 1 * * 1-5'
  workflow_dispatch:
    inputs:
      range:
        description: 'Rango Yahoo: 5d (incremental) o 10y (backfill inicial)'
        required: false
        default: '5d'
        type: choice
        options: ['5d', '1mo', '3mo', '6mo', '1y', '2y', '5y', '10y']
      batch_size:
        description: 'Tickers por invocación (default 200, máx 500)'
        required: false
        default: '200'

concurrency:
  group: cron-ohlcv-backfill
  cancel-in-progress: false

jobs:
  backfill:
    name: Iterar batches OHLCV
    runs-on: ubuntu-latest
    timeout-minutes: 90  # 13 batches × ~5min máx por batch
    steps:
      - name: Loopear batches hasta done
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT:    https://wall-livid.vercel.app/api/cron/ohlcv-backfill
          RANGE:       ${{ inputs.range || '5d' }}
          BATCH_SIZE:  ${{ inputs.batch_size || '200' }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET no configurado"; exit 1
          fi
          BATCH_START=0
          TOTAL_TICKERS=0
          TOTAL_ROWS=0
          BATCH_NUM=0
          while true; do
            BATCH_NUM=$((BATCH_NUM + 1))
            echo "=== Batch #$BATCH_NUM  start=$BATCH_START size=$BATCH_SIZE range=$RANGE ==="
            URL="${ENDPOINT}?batch_start=${BATCH_START}&batch_size=${BATCH_SIZE}&range=${RANGE}"
            STATUS=$(curl -sS -X GET "$URL" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "User-Agent: github-actions-ohlcv-backfill" \
              --max-time 320 \
              -o /tmp/resp.json \
              -w "%{http_code}")
            echo "HTTP $STATUS"
            cat /tmp/resp.json
            echo
            if [ "$STATUS" != "200" ]; then
              echo "::error::batch #$BATCH_NUM falló (HTTP $STATUS)"; exit 1
            fi
            # Parseo simple sin jq (mejor compatibilidad)
            DONE=$(grep -o '"done":[a-z]*' /tmp/resp.json | head -1 | cut -d: -f2)
            PROC=$(grep -o '"tickers_processed":[0-9]*' /tmp/resp.json | head -1 | cut -d: -f2)
            ROWS=$(grep -o '"rows_inserted":[0-9]*' /tmp/resp.json | head -1 | cut -d: -f2)
            NEXT=$(grep -o '"next_batch_start":[0-9]*' /tmp/resp.json | head -1 | cut -d: -f2)
            TOTAL_TICKERS=$((TOTAL_TICKERS + ${PROC:-0}))
            TOTAL_ROWS=$((TOTAL_ROWS + ${ROWS:-0}))
            if [ "$DONE" = "true" ]; then
              echo "✓ último batch — universe agotado en batch #$BATCH_NUM"
              break
            fi
            if [ -z "$NEXT" ]; then
              echo "::warning::no llegó next_batch_start; corto el loop"; break
            fi
            BATCH_START=$NEXT
            # Pausa entre batches para no concentrar carga a Yahoo
            sleep 10
          done
          echo "=== RESUMEN ==="
          echo "Batches:           $BATCH_NUM"
          echo "Tickers procesados: $TOTAL_TICKERS"
          echo "Filas insertadas:   $TOTAL_ROWS"
