name: Reporte intradía (4 momentos)

# Postea a Discord un snapshot del sistema (macro, top picks, SORE, triggers,
# distribución) en 4 momentos clave del día de trading. Lunes-viernes únicamente.
# El endpoint /api/report/intraday computa el reporte y lo postea al webhook.
#
# Horarios (UTC → Quito → ET):
#   10:30 UTC → 05:30 Quito → 06:30 ET  (PREP   — 3h antes de apertura)
#   13:00 UTC → 08:00 Quito → 09:00 ET  (OPEN-30 — 30min antes de apertura)
#   16:00 UTC → 11:00 Quito → 12:00 ET  (LUNCH   — almuerzo NY)
#   19:30 UTC → 14:30 Quito → 15:30 ET  (CLOSE-30 — 30min antes del cierre)

on:
  schedule:
    - cron: '30 10 * * 1-5'   # PREP
    - cron: '0 13 * * 1-5'    # OPEN-30
    - cron: '0 16 * * 1-5'    # LUNCH
    - cron: '30 19 * * 1-5'   # CLOSE-30
  workflow_dispatch:
    inputs:
      moment:
        description: 'Momento a forzar (vacío = derivar de la hora UTC actual)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - PREP
          - OPEN-30
          - LUNCH
          - CLOSE-30

concurrency:
  group: cron-intraday-report
  cancel-in-progress: false

jobs:
  post-report:
    name: Postear reporte a Discord
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Llamar /api/report/intraday (compute report)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT:    https://wall-livid.vercel.app/api/report/intraday
          MOMENT:      ${{ inputs.moment }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then echo "::error::CRON_SECRET no configurado"; exit 1; fi
          QUERY=""
          if [ -n "${MOMENT:-}" ]; then QUERY="?moment=${MOMENT}"; fi
          URL="${ENDPOINT}${QUERY}"
          echo "Llamando $URL"
          STATUS=$(curl -sS -X GET "$URL" -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: gha-intraday-report" --max-time 280 \
            -o /tmp/r.json -w "%{http_code}")
          echo "HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then cat /tmp/r.json; echo "::error::reporte falló"; exit 1; fi
          jq -r '. | "moment=\(.moment) | rows=\(.rows) | regime=\(.m6Regime) | vix=\(.m6Vix)"' /tmp/r.json || true

      - name: Postear reporte a Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN y/o TELEGRAM_CHAT_ID no configurados en GitHub Secrets"
            exit 1
          fi
          # Construye el payload JSON con jq para encoding seguro del HTML
          PAYLOAD=$(jq -n \
            --arg chat "$TG_CHAT" \
            --arg html "$(jq -r '.html' /tmp/r.json)" \
            '{chat_id: $chat, text: $html, parse_mode: "HTML", disable_web_page_preview: true}')
          STATUS=$(curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            -o /tmp/tg.json -w "%{http_code}")
          echo "Telegram HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then cat /tmp/tg.json; echo "::error::Telegram sendMessage falló"; exit 1; fi
          echo "✓ Reporte enviado a Telegram"
